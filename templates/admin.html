<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">🔐 SecureCloud Admin Panel</span>
        <a href="/dashboard" class="btn btn-primary">Back</a>
    </div>
</nav>

<div class="container mt-5">

    <!-- ===================== STATS ===================== -->
    <div class="row text-center">
        <div class="col-md-4">
            <div class="card bg-danger text-white p-3 shadow">
                <h5>SQL Attacks</h5>
                <h3>{{ sql }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-warning text-dark p-3 shadow">
                <h5>Failed Logins</h5>
                <h3>{{ failed }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-info text-white p-3 shadow">
                <h5>Malicious Data</h5>
                <h3>{{ malicious }}</h3>
            </div>
        </div>
    </div>

    <!-- ===================== CHART ===================== -->
    <div class="card shadow p-4 mt-5">
        <h4>📊 Attack Statistics</h4>
        <canvas id="attackChart"></canvas>
    </div>

    <!-- ===================== LOG TABLE ===================== -->
    <div class="card shadow p-3 mt-5">
        <h4>⚠️ Security Logs</h4>

        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Log Entry</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ log }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<!-- ===================== CHART SCRIPT ===================== -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('attackChart').getContext('2d');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['SQL Attacks', 'Failed Logins', 'Malicious Data'],
        datasets: [{
            label: 'Security Events',
            data: [{{ sql }}, {{ failed }}, {{ malicious }}],
            borderWidth: 1
        }]
    },
    options: {
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>

</body>
</html>
