<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">SecureCloud Dashboard</span>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
</nav>

<div class="container mt-5">
    <h3>Welcome, {{ user }} 👋</h3>

    <div class="card p-4 shadow mt-4">
        <h5>Submit Secure Data</h5>
        <form action="/submit" method="post">
            <input class="form-control my-2" name="data" placeholder="Enter sensitive data">
            <button class="btn btn-primary">Submit</button>
        </form>
    </div>

    <a href="/admin" class="btn btn-warning mt-4">View Admin Logs</a>
</div>

</body>
</html>
