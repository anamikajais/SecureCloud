<!DOCTYPE html>
<html>
<head>
    <title>SecureCloud Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg" style="width: 350px;">
        <h3 class="text-center text-dark">🔐 SecureCloud</h3>

        <form action="/login" method="post">
            <input class="form-control my-2" name="username" placeholder="Username">
            <input class="form-control my-2" type="password" name="password" placeholder="Password">
            <button class="btn btn-primary w-100 mt-2">Login</button>
        </form>

        <hr>

        <form action="/register" method="post">
            <input class="form-control my-2" name="username" placeholder="New Username">
            <input class="form-control my-2" type="password" name="password" placeholder="New Password">
            <button class="btn btn-success w-100 mt-2">Register</button>
        </form>
    </div>
</div>

</body>
</html>
